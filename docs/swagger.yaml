basePath: /api/v1
definitions:
  go-shop-backend_internal_dto.AddOrderItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    required:
    - product_id
    - quantity
    type: object
  go-shop-backend_internal_dto.AddWishlistItemRequest:
    properties:
      note:
        maxLength: 128
        type: string
      priority:
        maximum: 2
        minimum: 0
        type: integer
      product_id:
        type: string
    required:
    - priority
    - product_id
    type: object
  go-shop-backend_internal_dto.AddressResponse:
    properties:
      city:
        type: string
      comment:
        type: string
      country:
        type: string
      created_at:
        type: string
      entrance:
        type: string
      floor:
        type: string
      house:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      name:
        type: string
      street:
        type: string
      updated_at:
        type: string
    type: object
  go-shop-backend_internal_dto.CategoryResponse:
    properties:
      description:
        type: string
      has_children:
        type: boolean
      id:
        type: string
      is_active:
        type: boolean
      is_root:
        type: boolean
      name:
        type: string
      parent_id:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
    type: object
  go-shop-backend_internal_dto.ChangePasswordRequest:
    properties:
      code:
        type: string
      new_password:
        maxLength: 60
        minLength: 6
        type: string
      password:
        type: string
    required:
    - code
    - new_password
    - password
    type: object
  go-shop-backend_internal_dto.Confirm2FARequest:
    properties:
      code:
        type: string
      password:
        type: string
    required:
    - code
    - password
    type: object
  go-shop-backend_internal_dto.ConfirmEmailRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  go-shop-backend_internal_dto.ConfirmEmailResponse:
    properties:
      email_confirmed_at:
        description: ISO 8601
        type: string
      ok:
        type: boolean
    type: object
  go-shop-backend_internal_dto.ConfirmUploadProductImageRequest:
    properties:
      object_key:
        type: string
      upload_id:
        type: string
    required:
    - object_key
    - upload_id
    type: object
  go-shop-backend_internal_dto.CreatePaymentRequest:
    properties:
      order_id:
        type: string
      type:
        enum:
        - redirect
        - embedded
        type: string
    required:
    - order_id
    - type
    type: object
  go-shop-backend_internal_dto.CreateWishlistRequest:
    properties:
      is_public:
        type: boolean
      title:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - title
    type: object
  go-shop-backend_internal_dto.Disable2FARequest:
    properties:
      code:
        type: string
      password:
        type: string
    required:
    - code
    - password
    type: object
  go-shop-backend_internal_dto.OrderCheckoutRequest:
    properties:
      address_id:
        type: string
    required:
    - address_id
    type: object
  go-shop-backend_internal_dto.OrderItemProductResponse:
    properties:
      id:
        type: string
      images:
        items:
          properties:
            url:
              type: string
          type: object
        type: array
    type: object
  go-shop-backend_internal_dto.OrderItemResponse:
    properties:
      id:
        type: string
      product:
        $ref: '#/definitions/go-shop-backend_internal_dto.OrderItemProductResponse'
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
      unit_price:
        type: integer
    type: object
  go-shop-backend_internal_dto.OrderResponse:
    properties:
      address:
        $ref: '#/definitions/go-shop-backend_internal_dto.AddressResponse'
      canceled_at:
        type: string
      completed_at:
        type: string
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      is_guest_order:
        type: boolean
      items:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.OrderItemResponse'
        type: array
      paid_at:
        type: string
      payment_id:
        type: string
      provider_name:
        type: string
      status:
        type: string
      total_amount:
        type: integer
      updated_at:
        type: string
    type: object
  go-shop-backend_internal_dto.PaymentResponse:
    properties:
      confirmation_token:
        type: string
      confirmation_url:
        type: string
    type: object
  go-shop-backend_internal_dto.ProductCategoryResponse:
    properties:
      id:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  go-shop-backend_internal_dto.ProductCreateRequest:
    properties:
      description:
        maxLength: 4096
        minLength: 5
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      price:
        type: integer
      stock:
        type: integer
    required:
    - name
    - price
    - stock
    type: object
  go-shop-backend_internal_dto.ProductResponse:
    properties:
      available:
        type: integer
      categories:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.ProductCategoryResponse'
        type: array
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.UploadResponse'
        type: array
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: integer
      reserved:
        type: integer
      slug:
        type: string
      stock:
        type: integer
      updated_at:
        type: string
    type: object
  go-shop-backend_internal_dto.ProductUpdateRequest:
    properties:
      description:
        maxLength: 4096
        minLength: 5
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      price:
        type: integer
      stock:
        minimum: 0
        type: integer
    type: object
  go-shop-backend_internal_dto.SendEmailConfirmationResponse:
    properties:
      expires_in:
        description: seconds
        type: integer
    type: object
  go-shop-backend_internal_dto.Setup2FAResponse:
    properties:
      qr_code:
        type: string
      secret:
        type: string
    type: object
  go-shop-backend_internal_dto.SignURLResponse:
    properties:
      content_type:
        type: string
      expire_date:
        type: string
      filename:
        type: string
      form_data:
        additionalProperties:
          type: string
        type: object
      upload_id:
        type: string
      upload_url:
        type: string
    type: object
  go-shop-backend_internal_dto.UpdateWishlistItemRequest:
    properties:
      note:
        maxLength: 128
        type: string
      priority:
        maximum: 2
        minimum: 0
        type: integer
    type: object
  go-shop-backend_internal_dto.UpdateWishlistRequest:
    properties:
      is_public:
        type: boolean
      title:
        maxLength: 255
        minLength: 1
        type: string
    type: object
  go-shop-backend_internal_dto.UploadProductImageRequest:
    properties:
      content_type:
        type: string
      ext:
        enum:
        - jpg
        - png
        type: string
    required:
    - content_type
    - ext
    type: object
  go-shop-backend_internal_dto.UploadResponse:
    properties:
      content_type:
        type: string
      created_at:
        type: string
      media_type:
        type: string
      updated_at:
        type: string
      url:
        type: string
      variant:
        type: string
    type: object
  go-shop-backend_internal_dto.UserLoginRequest:
    properties:
      code:
        type: string
      email:
        type: string
      password:
        type: string
    required:
    - code
    - email
    - password
    type: object
  go-shop-backend_internal_dto.UserRegisterRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 60
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  go-shop-backend_internal_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      email_confirmed:
        type: boolean
      id:
        type: string
      role:
        type: string
      two_fa_enabled:
        type: boolean
    type: object
  go-shop-backend_internal_dto.UserTokenResponse:
    properties:
      access_token:
        type: string
      access_token_expires_at:
        type: integer
      refresh_token:
        type: string
      refresh_token_expires_at:
        type: integer
      token_type:
        type: string
      user:
        $ref: '#/definitions/go-shop-backend_internal_dto.UserResponse'
    type: object
  go-shop-backend_internal_dto.WishlistItemResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      note:
        type: string
      priority:
        type: integer
      product:
        $ref: '#/definitions/go-shop-backend_internal_dto.WishlistProductResponse'
      product_id:
        type: string
      updated_at:
        type: string
    type: object
  go-shop-backend_internal_dto.WishlistProductResponse:
    properties:
      available:
        type: integer
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: integer
    type: object
  go-shop-backend_internal_dto.WishlistResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      is_public:
        type: boolean
      items:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.WishlistItemResponse'
        type: array
      share_token:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  go-shop-backend_internal_dto.WishlistShareTokenResponse:
    properties:
      share_token:
        type: string
    type: object
  go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_CategoryResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.CategoryResponse'
        type: array
      total:
        type: integer
    type: object
  go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_OrderResponse:
    properties:
      data:
        items:
