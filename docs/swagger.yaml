basePath: /api/v1
definitions:
  go-shop-backend_internal_dto.Entity:
    properties:
      id:
        type: string
      type:
        $ref: '#/definitions/go-shop-backend_internal_dto.EntityType'
    required:
    - id
    - type
    type: object
  go-shop-backend_internal_dto.EntityType:
    enum:
    - products
    type: string
    x-enum-varnames:
    - EntityProduct
  go-shop-backend_internal_dto.ProductCategoryResponse:
    properties:
      id:
        type: string
      name:
        type: string
      parent_id:
        type: string
      slug:
        type: string
    type: object
  go-shop-backend_internal_dto.ProductCreateRequest:
    properties:
      description:
        maxLength: 4096
        minLength: 5
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      price:
        type: number
      stock:
        type: integer
    required:
    - name
    - price
    - stock
    type: object
  go-shop-backend_internal_dto.ProductResponse:
    properties:
      categories:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.ProductCategoryResponse'
        type: array
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.UploadResponse'
        type: array
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
      slug:
        type: string
      stock:
        type: integer
      updated_at:
        type: string
    type: object
  go-shop-backend_internal_dto.ProductUpdateRequest:
    properties:
      description:
        maxLength: 4096
        minLength: 5
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      price:
        type: number
      stock:
        minimum: 0
        type: integer
    type: object
  go-shop-backend_internal_dto.SignURLRequest:
    properties:
      content_type:
        type: string
      entity:
        $ref: '#/definitions/go-shop-backend_internal_dto.Entity'
      ext:
        enum:
        - jpg
        - png
        type: string
    required:
    - content_type
    - entity
    - ext
    type: object
  go-shop-backend_internal_dto.SignURLResponse:
    properties:
      content_type:
        type: string
      expire_date:
        type: string
      filename:
        type: string
      form_data:
        additionalProperties:
          type: string
        type: object
      upload_id:
        type: string
      upload_url:
        type: string
    type: object
  go-shop-backend_internal_dto.UploadRequest:
    properties:
      entity:
        $ref: '#/definitions/go-shop-backend_internal_dto.Entity'
      object_key:
        type: string
      upload_id:
        type: string
    required:
    - entity
    - object_key
    - upload_id
    type: object
  go-shop-backend_internal_dto.UploadResponse:
    properties:
      content_type:
        type: string
      created_at:
        type: string
      is_main:
        type: boolean
      updated_at:
        type: string
      url:
        type: string
    type: object
  go-shop-backend_internal_dto.UserLoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  go-shop-backend_internal_dto.UserRegisterRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 60
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  go-shop-backend_internal_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
  go-shop-backend_internal_dto.UserTokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/go-shop-backend_internal_dto.UserResponse'
    type: object
  go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_ProductCategoryResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.ProductCategoryResponse'
        type: array
      total:
        type: integer
    type: object
  go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_ProductResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.ProductResponse'
        type: array
      total:
        type: integer
    type: object
  go-shop-backend_pkg_response.Response-any:
    properties:
      error:
        type: string
      result: {}
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_ProductResponse:
    properties:
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.ProductResponse'
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_SignURLResponse:
    properties:
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.SignURLResponse'
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_UploadResponse:
    properties:
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.UploadResponse'
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_UserTokenResponse:
    properties:
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.UserTokenResponse'
    type: object
  ? go-shop-backend_pkg_response.Response-go-shop-backend_pkg_response_PaginatedResponse-array_go-shop-backend_internal_dto_ProductCategoryResponse
  : properties:
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_ProductCategoryResponse'
    type: object
  ? go-shop-backend_pkg_response.Response-go-shop-backend_pkg_response_PaginatedResponse-array_go-shop-backend_internal_dto_ProductResponse
  : properties:
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_ProductResponse'
    type: object
  go-shop-backend_pkg_response.Response-internal_dto_UserResponse:
    properties:
      error:
        type: string
      result:
        $ref: '#/definitions/internal_dto.UserResponse'
    type: object
  internal_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  title: Go Shop Backend API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login
      parameters:
      - description: Request body for login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.UserLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_UserTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: Login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register
      parameters:
      - description: Request body for registration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.UserRegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_UserTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "409":
          description: The user already exists
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: Register
      tags:
      - auth
  /categories/:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all categories or subcategories of a specific
        category. If ID is provided in the path, returns subcategories of that category.
        Otherwise returns all root categories.
      parameters:
      - default: 50
        description: Maximum number of items to return
        in: query
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Number of items to skip
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_pkg_response_PaginatedResponse-array_go-shop-backend_internal_dto_ProductCategoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: List categories or subcategories
      tags:
      - categories
  /categories/{id}:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all categories or subcategories of a specific
        category. If ID is provided in the path, returns subcategories of that category.
        Otherwise returns all root categories.
      parameters:
      - description: Parent category ID. If provided, returns subcategories of this
          category. If omitted, returns all root categories.
        format: uuid
        in: path
        name: id
        type: string
      - default: 50
        description: Maximum number of items to return
        in: query
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Number of items to skip
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_pkg_response_PaginatedResponse-array_go-shop-backend_internal_dto_ProductCategoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: List categories or subcategories
      tags:
      - categories
  /products:
    post:
      consumes:
      - application/json
      description: |-
        Create a new product with the provided details including categories
        ## Fields Description
        - **name** (required): Product name, 2-100 characters
        - **description** (optional): Product description, 5-500 characters if provided
        - **price** (required): Product price, must be greater than 0
        - **stock** (required): Initial stock quantity, must be greater than 0
        - **is_active** (optional): Whether product is active for sale. Defaults to true if not specified
        ## Example Request
        ```json
        {
        "name": "Premium Laptop",
        "description": "High-performance laptop with 16GB RAM and 512GB SSD",
        "price": 1299.99,
        "stock": 50,
        "is_active": true,
        }
        ```
      parameters:
      - description: Product creation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.ProductCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_ProductResponse'
        "400":
          description: Invalid request data or validation failed
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized (e.g., invalid token)
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "403":
          description: Access denied (e.g., no access rights)
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Create a new product
      tags:
      - products
  /products/:
    get:
      consumes:
      - application/json
      description: Get a paginated list of products with optional filtering by category
        and sorting
      parameters:
      - default: 50
        description: Maximum number of items to return
        in: query
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Number of items to skip
        in: query
        minimum: 0
        name: offset
        type: integer
      - description: Field to sort by
        enum:
        - name
        - created_at
        - price
        in: query
        name: order_by
        type: string
      - default: false
        description: Sort in descending order
        in: query
        name: order_desc
        type: boolean
      - description: Filter by category ID
        format: uuid
        in: query
        name: category_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_pkg_response_PaginatedResponse-array_go-shop-backend_internal_dto_ProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: List products with filtering and pagination
      tags:
      - products
  /products/{id}:
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific product by its UUID
      parameters:
      - description: Product ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_ProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: Get product by ID
      tags:
      - products
    patch:
      consumes:
      - application/json
      description: Partially update a product's information. Only provided fields
        will be updated.
      parameters:
      - description: Product ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Product update data (partial update)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.ProductUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_ProductResponse'
        "400":
          description: Invalid request data or validation failed
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized (e.g., invalid token)
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "403":
          description: Access denied (e.g., no access rights)
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "404":
          description: Product not found
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Update an existing product
      tags:
      - products
  /uploads/save:
    post:
      consumes:
      - application/json
      description: Bind a previously uploaded file (via signed URL) to a specific
        entity after successful upload
      parameters:
      - description: Upload save request parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.UploadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_UploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Attach uploaded file to entity
      tags:
      - uploads
  /uploads/signurl:
    post:
      consumes:
      - application/json
      description: Create a pre-signed URL for uploading files to storage
      parameters:
      - description: Sign URL request parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.SignURLRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_SignURLResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Generate signed URL for upload
      tags:
      - uploads
  /users/me:
    get:
      consumes:
      - application/json
      description: Get Me
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-internal_dto_UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Get Me
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token. "Bearer {token}"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
