basePath: /api/v1
definitions:
  go-shop-backend_internal_dto.AddOrderItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    required:
    - product_id
    - quantity
    type: object
  go-shop-backend_internal_dto.Confirm2FARequest:
    properties:
      code:
        type: string
      password:
        type: string
    required:
    - code
    - password
    type: object
  go-shop-backend_internal_dto.Disable2FARequest:
    properties:
      code:
        type: string
      password:
        type: string
    required:
    - code
    - password
    type: object
  go-shop-backend_internal_dto.OrderCheckoutResponse:
    properties:
      confirmation_url:
        type: string
      order_id:
        type: string
      unavailable_items:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.UnavailableItem'
        type: array
    type: object
  go-shop-backend_internal_dto.OrderItemResponse:
    properties:
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
      unit_price:
        type: integer
    type: object
  go-shop-backend_internal_dto.OrderResponse:
    properties:
      canceled_at:
        type: string
      completed_at:
        type: string
      created_at:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.OrderItemResponse'
        type: array
      paid_at:
        type: string
      payment_id:
        type: string
      provider_name:
        type: string
      status:
        type: string
      total_amount:
        type: integer
      updated_at:
        type: string
    type: object
  go-shop-backend_internal_dto.ProductCategoryResponse:
    properties:
      id:
        type: string
      name:
        type: string
      parent_id:
        type: string
      slug:
        type: string
    type: object
  go-shop-backend_internal_dto.ProductCreateRequest:
    properties:
      description:
        maxLength: 4096
        minLength: 5
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      price:
        type: integer
      stock:
        type: integer
    required:
    - name
    - price
    - stock
    type: object
  go-shop-backend_internal_dto.ProductResponse:
    properties:
      available:
        type: integer
      categories:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.ProductCategoryResponse'
        type: array
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.UploadResponse'
        type: array
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: integer
      reserved:
        type: integer
      slug:
        type: string
      stock:
        type: integer
      updated_at:
        type: string
    type: object
  go-shop-backend_internal_dto.ProductUpdateRequest:
    properties:
      description:
        maxLength: 4096
        minLength: 5
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      price:
        type: integer
      stock:
        minimum: 0
        type: integer
    type: object
  go-shop-backend_internal_dto.Setup2FAResponse:
    properties:
      qr_code:
        type: string
      secret:
        type: string
    type: object
  go-shop-backend_internal_dto.UnavailableItem:
    properties:
      action:
        type: string
      available_qty:
        type: integer
      product_id:
        type: string
      reason:
        type: string
      requested_qty:
        type: integer
    type: object
  go-shop-backend_internal_dto.UploadResponse:
    properties:
      content_type:
        type: string
      created_at:
        type: string
      is_main:
        type: boolean
      updated_at:
        type: string
      url:
        type: string
    type: object
  go-shop-backend_internal_dto.UserLoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  go-shop-backend_internal_dto.UserRegisterRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 60
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  go-shop-backend_internal_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      role:
        type: string
      two_fa_enabled:
        type: boolean
    type: object
  go-shop-backend_internal_dto.UserTokenResponse:
    properties:
      access_token:
        type: string
      partial_token:
        type: string
      refresh_token:
        type: string
      requires_2fa:
        type: boolean
      token_type:
        type: string
      user:
        $ref: '#/definitions/go-shop-backend_internal_dto.UserResponse'
    type: object
  go-shop-backend_internal_dto.Verify2FARequest:
    properties:
      code:
        type: string
      token:
        type: string
    required:
    - code
    - token
    type: object
  go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_OrderResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.OrderResponse'
        type: array
      total:
        type: integer
    type: object
  go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_ProductCategoryResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.ProductCategoryResponse'
        type: array
      total:
        type: integer
    type: object
  go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_ProductResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/go-shop-backend_internal_dto.ProductResponse'
        type: array
      total:
        type: integer
    type: object
  go-shop-backend_pkg_response.Response-any:
    properties:
      details: {}
      error:
        type: string
      result: {}
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_OrderCheckoutResponse:
    properties:
      details: {}
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.OrderCheckoutResponse'
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_OrderResponse:
    properties:
      details: {}
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.OrderResponse'
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_ProductResponse:
    properties:
      details: {}
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.ProductResponse'
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_Setup2FAResponse:
    properties:
      details: {}
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.Setup2FAResponse'
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_UserTokenResponse:
    properties:
      details: {}
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.UserTokenResponse'
    type: object
  ? go-shop-backend_pkg_response.Response-go-shop-backend_pkg_response_PaginatedResponse-array_go-shop-backend_internal_dto_ProductCategoryResponse
  : properties:
      details: {}
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_ProductCategoryResponse'
    type: object
  ? go-shop-backend_pkg_response.Response-go-shop-backend_pkg_response_PaginatedResponse-array_go-shop-backend_internal_dto_ProductResponse
  : properties:
      details: {}
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_ProductResponse'
    type: object
  go-shop-backend_pkg_response.Response-internal_dto_UserResponse:
    properties:
      details: {}
      error:
        type: string
      result:
        $ref: '#/definitions/internal_dto.UserResponse'
    type: object
  go-shop-backend_pkg_response.Response-string:
    properties:
      details: {}
      error:
        type: string
      result:
        type: string
    type: object
  internal_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      role:
        type: string
      two_fa_enabled:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  title: Go Shop Backend API
  version: "1.0"
paths:
  /auth/2fa/confirm:
    post:
      consumes:
      - application/json
      description: Confirm and enable two-factor authentication with the provided
        code
      parameters:
      - description: Request body with 2FA confirmation code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.Confirm2FARequest'
      produces:
      - application/json
      responses:
        "200":
          description: 2FA successfully enabled
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-string'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Confirm 2FA
      tags:
      - auth
  /auth/2fa/disable:
    post:
      consumes:
      - application/json
      description: Disable two-factor authentication for the authenticated user
      parameters:
      - description: Request body with password confirmation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.Disable2FARequest'
      produces:
      - application/json
      responses:
        "200":
          description: 2FA successfully disabled
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-string'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Disable 2FA
      tags:
      - auth
  /auth/2fa/setup:
    post:
      consumes:
      - application/json
      description: Initialize two-factor authentication setup for the authenticated
        user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_Setup2FAResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Setup 2FA
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login
      parameters:
      - description: Request body for login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.UserLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_UserTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: Login
      tags:
      - auth
  /auth/login/2fa:
    post:
      consumes:
      - application/json
      description: Authenticate user with two-factor authentication code
      parameters:
      - description: Request body with 2FA code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.Verify2FARequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_UserTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: Login with 2FA
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register
      parameters:
      - description: Request body for registration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.UserRegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_UserTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "409":
          description: The user already exists
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: Register
      tags:
      - auth
  /categories/:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all categories or subcategories of a specific
        category. If ID is provided in the path, returns subcategories of that category.
        Otherwise returns all root categories.
      parameters:
      - default: 50
        description: Maximum number of items to return
        in: query
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Number of items to skip
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_pkg_response_PaginatedResponse-array_go-shop-backend_internal_dto_ProductCategoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: List categories or subcategories
      tags:
      - categories
  /categories/{id}:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all categories or subcategories of a specific
        category. If ID is provided in the path, returns subcategories of that category.
        Otherwise returns all root categories.
      parameters:
      - description: Parent category ID. If provided, returns subcategories of this
          category. If omitted, returns all root categories.
        format: uuid
        in: path
        name: id
        type: string
      - default: 50
        description: Maximum number of items to return
        in: query
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Number of items to skip
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_pkg_response_PaginatedResponse-array_go-shop-backend_internal_dto_ProductCategoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: List categories or subcategories
      tags:
      - categories
  /orders:
    get:
      description: Get paginated list of orders
      parameters:
      - default: 50
        description: Maximum number of items to return
        in: query
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Number of items to skip
        in: query
        minimum: 0
        name: offset
        type: integer
      - description: Session ID
        format: uuid
        in: header
        name: X-Session-ID
        required: true
        type: string
      - description: Order status
        enum:
        - draft
        - pending
        - paid
        - canceled
        - completed
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.PaginatedResponse-array_go-shop-backend_internal_dto_OrderResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Get list of orders
      tags:
      - Orders
    post:
      description: Create new order
      parameters:
      - description: Session ID
        format: uuid
        in: header
        name: X-Session-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_OrderResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Create new order
      tags:
      - Orders
  /orders/{id}:
    get:
      description: Get single order by ID
      parameters:
      - description: Order ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Session ID
        format: uuid
        in: header
        name: X-Session-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_OrderResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Get order by ID
      tags:
      - Orders
  /orders/{id}/checkout:
    post:
      description: Checkout order (changes status from draft to pending)
      parameters:
      - description: Order ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Session ID
        format: uuid
        in: header
        name: X-Session-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_OrderCheckoutResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Checkout order
      tags:
      - Orders
  /orders/{id}/items:
    delete:
      description: Removes all items from the order (clears shopping cart)
      parameters:
      - description: Order ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Session ID
        format: uuid
        in: header
        name: X-Session-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_OrderResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      security:
      - BearerAuth: []
      summary: Clear all items from order
      tags:
      - Orders
    post:
      consumes:
      - application/json
      description: Add product to existing order
      parameters:
      - description: Order ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Session ID
        format: uuid
        in: header
        name: X-Session-ID
        required: true
        type: string
      - description: Add item request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.AddOrderItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "403":
