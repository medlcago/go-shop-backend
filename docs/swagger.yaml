basePath: /api/v1
definitions:
  go-shop-backend_internal_dto.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/go-shop-backend_internal_dto.UserResponse'
    type: object
  go-shop-backend_internal_dto.RegisterResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/go-shop-backend_internal_dto.UserResponse'
    type: object
  go-shop-backend_internal_dto.UserLoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  go-shop-backend_internal_dto.UserRegisterRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 60
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  go-shop-backend_internal_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
  go-shop-backend_pkg_response.Response-any:
    properties:
      error:
        type: string
      result: {}
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_LoginResponse:
    properties:
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.LoginResponse'
    type: object
  go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_RegisterResponse:
    properties:
      error:
        type: string
      result:
        $ref: '#/definitions/go-shop-backend_internal_dto.RegisterResponse'
    type: object
host: localhost:8080
info:
  contact: {}
  title: Go Shop Backend API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login
      parameters:
      - description: Request body for login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.UserLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: Login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register
      parameters:
      - description: Request body for registration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-shop-backend_internal_dto.UserRegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-go-shop-backend_internal_dto_RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "409":
          description: The user already exists
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-shop-backend_pkg_response.Response-any'
      summary: Register
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token. "Bearer {token}"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
