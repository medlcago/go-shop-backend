  /products:
    post:
      consumes:
      - application/json
      description: |-
        Create a new product with the provided details including categories
        ## Fields Description
        - **name** (required): Product name, 2-100 characters
        - **description** (optional): Product description, 5-500 characters if provided
        - **price** (required): Product price, must be greater than 0
        - **stock** (required): Initial stock quantity, must be greater than 0
        - **is_active** (optional): Whether product is active for sale. Defaults to true if not specified
        ## Example Request
        ```json
        {
        "name": "Premium Laptop",
        "description": "High-performance laptop with 16GB RAM and 512GB SSD",
        "price": 1299.99,
        "stock": 50,
        "is_active": true,
        }
        ```
