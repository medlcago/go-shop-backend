proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m max_size=1g inactive=60m use_temp_path=off;

upstream app {
    server app:8080;
    keepalive 32;
}

upstream minio {
    server minio:9000;
    keepalive 32;
}

server {
    listen 80;
    server_tokens off;

    location /media {
        proxy_pass http://minio;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache static_cache;

        proxy_cache_valid 200 301 302 365d;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;

        add_header Cache-Control "public, immutable, max-age=31536000" always;

        proxy_cache_key $scheme$request_method$host$request_uri;
        proxy_cache_bypass $arg_v $arg_version;
        proxy_no_cache $arg_v $arg_version;

        proxy_cache_revalidate off;
        proxy_cache_background_update off;

        proxy_cache_use_stale error timeout invalid_header updating
                                   http_500 http_502 http_503 http_504;

        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_lock_age 10s;

        proxy_buffering on;
    }

    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
